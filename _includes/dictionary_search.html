<form class="search" action="/dictionary" method="get">
  <input
    name="q"
    type="search"
    placeholder="Search the dictionary"
    autocomplete="off"
  />
  <select name="mode" id="mode">
    <option value="general">General search</option>
    <option value="lemma-exact">Exact match</option>
    <option value="lemma-prefix">Beginning with</option>
    <option value="lemma-contains">Containing</option>
    <option value="lemma-suffix">Ending in</option>
    <option value="gloss-exact">Exact translation</option>
    <!--<option value="gloss-prefix">Gloss: begins with</option>-->
    <!--<option value="gloss-contains">Contained in translation</option>-->
    <!--<option value="gloss-suffix">Gloss: ends with</option>-->
    <option value="random">Random</option>
  </select>
  <button type="submit">Search</button>
</form>
